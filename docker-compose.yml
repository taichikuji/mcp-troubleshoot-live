services:
  troubleshoot-mcp:
    build: ./
    # image: ghcr.io/your-org/troubleshoot-live-mcp
    restart: unless-stopped
    container_name: troubleshoot-mcp
    ports:
      # HOST_PORT is the port exposed on your machine. The app always binds
      # to 3000 inside the container. Change HOST_PORT if 3100 conflicts.
      - "${HOST_PORT:-3100}:3000"
    environment:
      # Path to the bundle inside the container (/bundles/<filename>).
      # The server will start troubleshoot-live automatically on boot.
      # Remove or leave empty to load a bundle manually via the start_bundle tool.
      - BUNDLE_PATH=${BUNDLE_PATH:-/bundles/bundle.tar.gz}
      - PROXY_ADDRESS=${PROXY_ADDRESS:-localhost:8080}
      - KUBECTL_VERSION=${KUBECTL_VERSION:-v1.29.4}
    volumes:
      # Drop your .tar.gz support bundles into ./bundles/ on the host.
      - ./bundles:/bundles
      # Cache the envtest binaries (kube-apiserver + etcd) across restarts
      # so troubleshoot-live doesn't re-download them every time.
      - envtest-cache:/cache/kubebuilder-envtest

volumes:
  envtest-cache:
