services:
  troubleshoot-mcp:
    build: ./
    # image: ghcr.io/your-org/support-bundle-mcp
    restart: unless-stopped
    container_name: troubleshoot-mcp
    ports:
      # App always binds 3000 inside; HOST_PORT is the host-side port.
      - "${HOST_PORT:-3100}:3000"
    environment:
      - BUNDLES_DIR=${BUNDLES_DIR:-/bundles}
      # Override for the upload URL shown by prepare_upload; leave unset to auto-detect from each request's Host header.
      - PUBLIC_URL=${PUBLIC_URL:-}
      # Upload size cap + idle TTL. Defaults: 5 GB / 6 h. Wiped on restart, deleted on stop_bundle.
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-5368709120}
      - UPLOAD_TTL_MS=${UPLOAD_TTL_MS:-21600000}
      # Archive bomb limits: 20 GB expanded data and 500k files by default.
      - MAX_EXTRACTED_BYTES=${MAX_EXTRACTED_BYTES:-21474836480}
      - MAX_ARCHIVE_FILES=${MAX_ARCHIVE_FILES:-500000}
    volumes:
      # Optional: drop .tar.gz bundles here for direct loading without upload.
      - ./bundles:/bundles
