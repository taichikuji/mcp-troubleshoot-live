services:
  troubleshoot-mcp:
    build: ./
    # image: ghcr.io/your-org/troubleshoot-live-mcp
    restart: unless-stopped
    container_name: troubleshoot-mcp
    ports:
      # App always binds 3000 inside; HOST_PORT is the host-side port.
      - "${HOST_PORT:-3100}:3000"
    environment:
      # Auto-load on startup; unset = AI picks one via list_bundles/start_bundle.
      - BUNDLE_PATH=${BUNDLE_PATH:-}
      - BUNDLES_DIR=${BUNDLES_DIR:-/bundles}
      # Internal proxy address troubleshoot-live + kubectl share inside the container.
      - PROXY_ADDRESS=${PROXY_ADDRESS:-localhost:8080}
      # URL the user's MCP client uses to reach this server. Set when MCP and client are on different hosts.
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:${HOST_PORT:-3100}}
      # Upload size cap + idle TTL. Defaults: 5 GB / 6 h. Wiped on restart, deleted on stop_bundle.
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-5368709120}
      - UPLOAD_TTL_MS=${UPLOAD_TTL_MS:-21600000}
    volumes:
      # Optional: drop .tar.gz bundles here for direct loading without upload.
      - ./bundles:/bundles
      # Cache envtest binaries (kube-apiserver + etcd) at the default setup-envtest path.
      - envtest-cache:/home/node/.local/share/kubebuilder-envtest

volumes:
  envtest-cache:
